<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lade...</title>
    <link id="dynamic-favicon" rel="icon" type="image/png" href="assets/img/favicon.png">
    <link href="assets/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/bootstrap/css/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
<div id="background-blur"></div>
<div class="main-content">
    <div class="row g-4 header-grid align-items-stretch">
        <div class="col-md-3 d-flex align-items-center justify-content-center">
            <img id="header-logo" class="header-logo" src="" alt="Station Logo">
        </div>

        <div class="col-md-5 mb-3">
            <div class="white-card">
                <h1 id="header-name" class="fw-black mb-1">Lade Name...</h1>
                <p id="header-slogan" class="fw-bold italic mb-3">Lade Slogan...</p>
                <p id="header-desc" class="small text-muted mb-0">Lade Beschreibung...</p>

                <div class="station-details-links">
                    <a class="rounded-circle social-link link-lfm" id="lfm-link" title="laut.fm" target="_blank" href="#"><i class="bi bi-broadcast-pin"></i></a>
                    <a class="rounded-circle social-link link-hp" id="hp-link" title="Webseite" target="_blank" href="#"><i class="bi bi-globe2"></i></a>
                    <a class="rounded-circle social-link link-fb" id="fb-link" title="Facebook" target="_blank" href="#"><i class="bi bi-facebook"></i></a>
                    <a class="rounded-circle social-link link-ig" id="ig-link" title="Instagram" target="_blank" href="#"><i class="bi bi-instagram"></i></a>
                </div>

                <div class=" rounded-3 btn-group btn_external shadow-sm">
                    <a class="rounded-start-2 btn btn-sm btn-grey" id="m3u-link" href="#">M3U</a>
                    <a class="btn btn-sm btn-grey" id="pls-link" href="#">PLS</a>
                    <a class="btn btn-sm btn-grey" id="radiode-link" target="_blank" href="#">radio.de</a>
                    <a class="rounded-end-2 btn btn-sm btn-grey" id="phonostar-link" target="_blank" href="#">PHONOSTAR</a>
                </div>
            </div>
        </div>

        <div class="col-md-4 d-flex flex-column gap-3 mb-3">
            <div class="white-card py-3 px-4">
                <div class="small fw-bold text-muted">Seit: <span id="show-time-now">--</span> Uhr</div>
                <h3 class="fw-black m-0"><span id="show-name-now">Programm</span></h3>
                <div class="small fw-bold text-muted"><span id="show-description-now"> </span></div>
            </div>
            <div class="white-card py-3 px-4 mt-3">
                <div class="small fw-bold text-muted">Ab: <span id="show-time-next">--</span> Uhr</div>
                <h3 class="fw-black m-0"><span id="show-name-next">Demnächst</span></h3>
                <div class="small fw-bold text-muted"><span id="show-description-next"> </span></div>
            </div>
        </div>
    </div>

    <div class="glass-wrapper">
        <div class="row g-5">
            <div class="col-lg-6 text-center border-end border-white border-opacity-10">
                <img id="cover-art" src="" alt="Album Cover">
                <div class="mb-4">
                    <div class="section-label" id="live-from">LIVE</div>
                    <h2 id="track" class="fw-bold mb-1"><div class="spinner-grow" role="status">
                        <span class="visually-hidden">Verbinde...</span>
                    </div> Verbinde...</h2>
                    <h5 id="artist" class="fw-normal">Bitte warten</h5>
                </div>
                <button id="ctrl" class="play-btn mb-5">
                    <div id="play-icon">
                        <i class="bi bi-play-fill"></i>
                    </div>
                </button>
            </div>

            <div class="col-lg-6">
                <div class="list-card">
                    <div class="section-label text-white-50"><i class="bi bi-music-note-list"></i> Zuletzt gehört</div>
                    <div id="history-container"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="container-fluid mt-5 px-0">
    <div class="timetable-wrapper">
        <div class="d-flex flex-nowrap gap-4 pb-4" id="timetable">
        </div>
    </div>
</div>

<footer>
    <p class="mb-0" id="powered-by">STATION is powered by:</p>
    <a href="https://laut.fm/" target="_blank">
        <img src="assets/img/lautfm.svg" alt="laut.fm">
    </a>
</footer>

<audio id="stream"></audio>
</body>
<script src="assets/js/main.js"></script>
<script src="assets/bootstrap/js/bootstrap.bundle.min.js"></script>
</html>
